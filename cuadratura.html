<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuadratura</title>

<script src="core.js"></script>

<style>

/* 🌍 BASE */
body{
  margin:0;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:#fff;
  font-family:'Segoe UI', Arial;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden; /* 🚫 sin scroll */
}

/* HEADER */
header{
  text-align:center;
  padding:0.8vh;
  background:linear-gradient(90deg,#22c55e,#4ade80);
  color:#022c22;
  flex-shrink:0;
}

#main-title{
  font-size:clamp(28px,3.5vh,70px);
  font-weight:900;
}

#sub-title{
  font-size:clamp(12px,1.5vh,20px);
  opacity:0.85;
}

/* CONTENIDO */
#content{
  flex:1;
  display:flex;
  padding:1vh;
}

/* CONTENEDOR */
.container{
  width:100%;
  height:100%;
  display:flex;
}

/* TABLA */
table{
  width:100%;
  height:100%;
  border-collapse:collapse;
  table-layout:fixed;
  font-size:clamp(12px,1.6vh,22px);
}

/* HEADER TABLA */
th{
  background:#22c55e;
  color:#022c22;
  padding:0.5vh;
  text-align:center;
}

/* CELDAS */
td{
  padding:0.4vh;
  text-align:center;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

/* FILAS AUTO AJUSTE */
tbody tr{
  height:calc(100% / 18);
}

tr:nth-child(even){
  background:rgba(255,255,255,0.06);
}

/* 🚨 ALERTA */
.alert{
  animation:blink 0.8s infinite;
  font-weight:900;
}

@keyframes blink{
  0%{background:#7f1d1d;}
  50%{background:#ff0000;}
  100%{background:#7f1d1d;}
}

/* LOADING */
.loading{
  margin:auto;
  font-size:clamp(18px,2vw,40px);
}

</style>
</head>

<body>

<header>
  <div id="main-title">Cargando...</div>
  <div id="sub-title"></div>
</header>

<div id="content">
  <div class="loading">Cargando datos...</div>
</div>

<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRU5OQHyRj-OXlfqf9yxT0E8YoBnDVksnXRSZBPDCHBfs5o0Kn70vTJ7oGXY6PfxDrLDj5PaOu6Rbtb/pub?gid=500993062&single=true&output=csv";

function render(rows){

  if(!rows || rows.length < 2){
    document.getElementById("content").innerHTML = "Sin datos";
    return;
  }

  // 🔥 TITULO PRINCIPAL (A21)
  const titulo = rows[20]?.[0] || "CUADRATURA";
  document.getElementById("main-title").textContent = titulo;

  // 🕒 SUBTITULO (A20)
  const fecha = rows[19]?.[0] || "";
  document.getElementById("sub-title").textContent =
    "Última actualización: " + fecha;

  // 📊 HEADERS (fila 1)
  const headers = rows[0].slice(0,6);

  let html = `
    <div class="container">
      <table>
        <thead>
          <tr>
            ${headers.map(h => `<th>${h || ""}</th>`).join("")}
          </tr>
        </thead>
        <tbody>
  `;

  // 📊 DATOS (filas 2–19)
  for(let i=1; i<19 && i<rows.length; i++){

    const row = rows[i].slice(0,6);

    // ignorar filas vacías
    if(row.every(c => !c)) continue;

    // 🚨 detectar NO CUADRA
    const isAlert = row.some(c =>
      c && c.toString().toUpperCase().includes("NO CUADRA")
    );

    html += `<tr class="${isAlert ? 'alert' : ''}">`;

    row.forEach(cell=>{
      html += `<td>${cell || ""}</td>`;
    });

    html += "</tr>";
  }

  html += `
        </tbody>
      </table>
    </div>
  `;

  document.getElementById("content").innerHTML = html;
}

// 🔄 fetch seguro + cache
fetchSafe(CSV_URL, "cache_cuadratura", render);

</script>

</body>
</html>
