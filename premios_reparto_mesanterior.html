<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Premios Reparto</title>

<script src="core.js"></script>

<style>

/* 🌍 BASE GLOBAL */
body{
  margin:0;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:#fff;
  font-family: 'Segoe UI', Arial, sans-serif;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER */
header{
  text-align:center;
  padding:1vh;
  background:linear-gradient(90deg,#22c55e,#4ade80);
  color:#022c22;
  box-shadow:0 0 30px rgba(34,197,94,0.4);
  display:flex;
  flex-direction:column;
}

#main-title{
  font-size:clamp(22px, 3vh, 60px);
  font-weight:900;
}

#sub-title{
  font-size:clamp(14px, 1.4vh, 26px);
  opacity:0.8;
}

/* CONTENIDO */
#content{
  flex:1;
  display:flex;
  padding:1vh 1vw;
}

/* GRID */
.container{
  width:100%;
  height:100%;
  display:grid;
  grid-template-rows: repeat(var(--rows), 1fr);
  gap:1vh;
}

/* FILAS */
.top1, .row{
  display:grid;
  grid-template-columns: 80px 1fr 1fr 180px;
  align-items:center;
  padding:0.9vh 1.2vw;
  border-radius:14px;
  font-weight:900;
  overflow:hidden;
}

/* TOP 1 */
.top1{
  font-size:clamp(20px, 2.8vh, 52px);
  background:linear-gradient(90deg,gold,#fff3b0);
  color:#000;
  box-shadow:0 0 30px rgba(255,215,0,0.6);
}

/* FILAS */
.row{
  font-size:clamp(16px, 2vh, 34px);
  background:rgba(255,255,255,0.08);
}

/* ICONO */
.medal{
  font-size:clamp(18px, 2.4vh, 42px);
  text-align:center;
}

/* COLORES */
.silver{
  background:linear-gradient(90deg,#e5e7eb,#f3f4f6);
  color:#000;
}

.bronze{
  background:linear-gradient(90deg,#ffd8a8,#ffe8cc);
  color:#000;
}

.place{
  text-align:right;
}

/* TEXTO */
.row div, .top1 div{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* ANIMACIÓN */
.fade{
  animation:fadeUp .5s ease;
}

@keyframes fadeUp{
  from{ opacity:0; transform:translateY(20px); }
  to{ opacity:1; transform:translateY(0); }
}

.loading{
  margin:auto;
  font-size:clamp(18px,2vw,40px);
}

</style>
</head>

<body>

<header>
  <div id="main-title">Cargando...</div>
  <div id="sub-title"></div>
</header>

<div id="content">
  <div class="loading">Cargando datos...</div>
</div>

<script>
const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRU5OQHyRj-OXlfqf9yxT0E8YoBnDVksnXRSZBPDCHBfs5o0Kn70vTJ7oGXY6PfxDrLDj5PaOu6Rbtb/pub?gid=358940228&single=true&output=csv";

function render(rows){

  // HEADER DINÁMICO
  const titulo = rows[7]?.[0] || "SIN TÍTULO";
  const fecha  = rows[8]?.[0] || "";

  document.getElementById("main-title").textContent = titulo;
  document.getElementById("sub-title").textContent = "Última actualización: " + fecha;

  let html = `<div class="container">`;

  let count = 0;

  for(let i = 1; i < rows.length; i++){

    const nombre = rows[i][0];

    // cortar en fila de título
    if(nombre && nombre.toUpperCase().includes("RESULTADOS")){
      break;
    }

    if(count >= 7) break;

    const chofer   = rows[i][0];
    const peoneta  = rows[i][1];
    const lugarRaw = rows[i][2];

    // 🎯 FORMATO INTELIGENTE DEL LUGAR
    let lugarTexto = lugarRaw;

    if(!isNaN(lugarRaw)){
      lugarTexto = lugarRaw + " LUGAR";
    }

    let medal = "";
    let cls = "";

    const lugarNum = Number(lugarRaw);

    if(lugarNum === 1){
      medal = "🥇";

      html += `
        <div class="top1 fade">
          <div class="medal">${medal}</div>
          <div>${chofer}</div>
          <div>${peoneta}</div>
          <div class="place">${lugarTexto}</div>
        </div>
      `;
      count++;
      continue;
    }

    if(lugarNum === 2){
      medal = "🥈";
      cls = "silver";
    }
    else if(lugarNum === 3){
      medal = "🥉";
      cls = "bronze";
    }

    html += `
      <div class="row ${cls} fade">
        <div class="medal">${medal}</div>
        <div>${chofer}</div>
        <div>${peoneta}</div>
        <div class="place">${lugarTexto}</div>
      </div>
    `;

    count++;
  }

  document.documentElement.style.setProperty('--rows', count);

  html += "</div>";

  document.getElementById("content").innerHTML = html;
}

fetchSafe(CSV_URL, "cache_reparto", render);
</script>

</body>
</html>
